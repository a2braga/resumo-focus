name: Focus BCB — Download semanal

on:
  schedule:
    # Toda segunda-feira às 12h15 UTC (9h15 BRT)
    - cron: "15 12 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Baixar PDF do Focus
        run: python src/baixar_focus.py

      - name: Extrair texto do PDF
        run: python src/extrair_texto.py

      - name: Commitar arquivos gerados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/focus_*.pdf data/focus_*.txt
          # Só commita se houver algo novo
          git diff --cached --quiet || git commit -m "focus: download automático $(date -u +%Y-%m-%d)"
          git push
